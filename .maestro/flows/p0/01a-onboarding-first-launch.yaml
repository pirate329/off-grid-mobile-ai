# P0 E2E: 1.1 Onboarding appears on first launch
# Verifies onboarding shows on fresh install, slides work, and "Get Started" navigates to Model Download
# QA_TEST_PLAN §1.1

appId: ${APP_ID}
name: "P0: Onboarding First Launch"
tags:
  - p0
  - onboarding
  - first-launch
---

# ── Fresh install: wipe persisted state so hasCompletedOnboarding resets ──
- clearState
- launchApp

# Wait for JS bundle + app init + navigation (clearState wipes Metro cache)
- extendedWaitUntil:
    visible:
      id: "onboarding-screen"
    timeout: 60000

# Must NOT show Home screen
- assertNotVisible:
    id: "home-screen"

# Wait for first slide keyword animation (500ms stagger)
- extendedWaitUntil:
    visible:
      text: "YOURS"
    timeout: 5000

# Verify Skip and Next buttons on first slide
- assertVisible:
    id: "onboarding-skip"
- assertVisible:
    text: "Next"

# ── Swipe through all slides ──

# Slide 1 → 2
- swipe:
    direction: LEFT
    duration: 400
- extendedWaitUntil:
    visible:
      text: "MAGIC"
    timeout: 5000

# Slide 2 → 3
- swipe:
    direction: LEFT
    duration: 400
- extendedWaitUntil:
    visible:
      text: "CREATE"
    timeout: 5000

# Skip still visible before last slide
- assertVisible:
    id: "onboarding-skip"

# Slide 3 → 4 (last)
- swipe:
    direction: LEFT
    duration: 400
- extendedWaitUntil:
    visible:
      text: "READY"
    timeout: 5000

# ── Last slide: "Get Started" shown, Skip hidden ──
- assertVisible:
    text: "Get Started"
- assertNotVisible:
    id: "onboarding-skip"

# ── Tap "Get Started" → Model Download screen ──
- tapOn:
    id: "onboarding-next"

- extendedWaitUntil:
    visible:
      id: "model-download-screen"
    timeout: 20000

- assertNotVisible:
    id: "onboarding-screen"
