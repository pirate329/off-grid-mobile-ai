appId: ai.offgridmobile
---
# E2E — Full vision model import flow (2 GGUF files)
#
# Pre-condition: seed the simulator first:
#   node e2e/scripts/seedSimulatorFiles.js
#
# What this tests end-to-end:
#   ✅ Import Local File button tapped
#   ✅ Native file picker opens
#   ✅ 2 .gguf files multi-selected
#   ✅ Confirmation dialog shows correct file names
#   ✅ Tapping Import completes the import
#   ✅ Imported model appears in Text Models list

- launchApp:
    clearState: false

- waitForAnimationToEnd

# ── Navigate to Models screen ─────────────────────────────────────────────
- tapOn:
    id: "models-tab"

- assertVisible:
    id: "import-local-model"

# ── Open file picker ──────────────────────────────────────────────────────
- tapOn:
    id: "import-local-model"

- waitForAnimationToEnd

# ── Navigate to Browse → On My iPhone ────────────────────────────────────
- tapOn:
    text: "Browse"

- waitForAnimationToEnd

- tapOn:
    text: "On My iPhone"

- waitForAnimationToEnd

# ── Tap both files — multi-select is enabled so each tap adds a checkmark ─
- tapOn:
    text: "e2e-test-model-Q4_K_M.gguf"

- tapOn:
    text: "e2e-test-mmproj-f16.gguf"

# ── Open selected files ───────────────────────────────────────────────────
- tapOn:
    text: "Open"

- waitForAnimationToEnd

# ── Confirmation dialog (inside app — Maestro can see this) ──────────────
- assertVisible:
    text: "Import Vision Model?"

- assertVisible:
    text: "Cancel"

- assertVisible:
    text: "Import"

# ── Confirm ───────────────────────────────────────────────────────────────
- tapOn:
    text: "Import"

- waitForAnimationToEnd

# ── Open Download Manager to verify model was imported ───────────────────
- tapOn:
    id: "downloads-icon"

- waitForAnimationToEnd

- assertVisible:
    text: "Downloaded Models"

- assertVisible:
    text: "e2e-test-model-Q4_K_M.gguf"
