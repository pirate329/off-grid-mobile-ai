appId: ai.offgridmobile
---
# E2E — Models screen basic navigation and tab switching

- launchApp:
    clearState: false

- waitForAnimationToEnd

# ── Navigate to Models screen ─────────────────────────────────────────────
- tapOn:
    id: "models-tab"

# ── Default tab is Text Models ────────────────────────────────────────────
- assertVisible:
    text: "Text Models"

- assertVisible:
    text: "Image Models"

- assertVisible:
    id: "import-local-model"

# ── Switch to Image Models tab ────────────────────────────────────────────
- tapOn:
    text: "Image Models"

- waitForAnimationToEnd

- assertVisible:
    text: "Image Models"

# ── Switch back to Text Models ────────────────────────────────────────────
- tapOn:
    text: "Text Models"

- assertVisible:
    id: "import-local-model"
